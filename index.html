<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VozBoard Pro - Instant Response</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e11;color:#f0f0f5;font-family:sans-serif;min-height:100vh;padding:10px}
  header{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a35;margin-bottom:10px}
  .logo{color:#00e5ff;font-weight:bold;font-size:14px; letter-spacing: 1px;}
  #status{font-size:11px;color:#6b6b80;background:#1a1a20;padding:4px 10px;border-radius:20px; transition: all 0.3s;}
  #status.listening{color:#ff3d6e;border:1px solid #ff3d6e; box-shadow: 0 0 10px rgba(255,61,110,0.2);}
  #status.playing{color:#00ff9d;border:1px solid #00ff9d}
  
  .controls{display:flex;gap:8px;margin-bottom:10px}
  button{flex:1;padding:16px;border-radius:12px;border:1px solid #2a2a35;background:#1a1a20;color:#f0f0f5;font-size:13px;font-weight:bold;cursor:pointer; transition: 0.2s;}
  #micBtn{border-color:#7c4dff;color:#7c4dff}
  #micBtn.on{background:rgba(255,61,110,0.15);border-color:#ff3d6e;color:#ff3d6e; animation: pulse 2s infinite;}
  @keyframes pulse{ 0%{opacity:1} 50%{opacity:0.7} 100%{opacity:1} }
  
  #loadBtn{border-color:#00e5ff;color:#00e5ff;background:#05191C}
  input[type=file]{display:none}
  
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .pad{background:#16161c;border:1px solid #2a2a35;border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:80px; position: relative;}
  .pad.loaded{background:#1a1f2e;border-color:#3a4060}
  .pad.playing{background:#0d2035;border-color:#00e5ff;box-shadow:0 0 15px rgba(0,229,255,0.3); transform: scale(1.02);}
  
  .num{width:28px;height:28px;border-radius:50%;background:#22222a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#6b6b80}
  .pad.loaded .num{background:rgba(124,77,255,0.3);color:#b39dff}
  .pad.playing .num{background:#00e5ff;color:#000}
  
  .name{font-size:11px;font-weight:bold;text-align:center; color: #a0a0b0}
  .del{position:absolute;top:5px;right:8px;color:#444;font-size:14px;cursor:pointer}
  .empty{color:#444;font-size:10px; margin-top: 10px;}
  .info{font-size:12px;color:#00e5ff;padding:10px;background:rgba(0,229,255,0.05);border-radius:8px;margin-bottom:10px;border-left:3px solid #00e5ff}
</style>
</head>
<body>

<header>
  <div class="logo">VOZBOARD PRO</div>
  <div id="status">esperando...</div>
</header>

<div class="info" id="info">1. Carga audios numerados (Ej: 1_Efecto.mp3) <br> 2. Activa el micro y di el número.</div>

<div class="controls">
  <button id="micBtn">🎤 Activar Escucha Continua</button>
  <label style="flex:1">
    <button id="loadBtn" onclick="document.getElementById('fileInput').click()">📁 Cargar Audios</button>
    <input type="file" id="fileInput" accept="audio/*" multiple onchange="loadFiles(this.files)">
  </label>
</div>

<div class="grid" id="grid"></div>

<script>
const TOTAL = 50;
const pads = Array.from({length:TOTAL},(_,i)=>({num:i+1,name:'',audio:null,url:null}));
let recognition = null;
let isListening = false;
let debounceTimer = null;
let lastTriggered = 0;

// Diccionario extendido para evitar errores de transcripción
const numWords = {};
const es = ['', 'uno', 'dos', 'tres', 'cuatro', 'cinco', 'seis', 'siete', 'ocho', 'nueve', 'diez', 'once', 'doce', 'trece', 'catorce', 'quince', 'dieciséis', 'diecisiete', 'dieciocho', 'diecinueve', 'veinte', 'veintiuno', 'veintidós', 'veintitrés', 'veinticuatro', 'veinticinco', 'veintiséis', 'veintisiete', 'veintiocho', 'veintinueve', 'treinta', 'treinta y uno', 'treinta y dos', 'treinta y tres', 'treinta y cuatro', 'treinta y cinco', 'treinta y seis', 'treinta y siete', 'treinta y ocho', 'treinta y nueve', 'cuarenta', 'cuarenta y uno', 'cuarenta y dos', 'cuarenta y tres', 'cuarenta y cuatro', 'cuarenta y cinco', 'cuarenta y seis', 'cuarenta y siete', 'cuarenta y ocho', 'cuarenta y nueve', 'cincuenta'];

// Mapeo de palabras a números
for(let i=1; i<=50; i++){
  numWords[String(i)] = i;
  if(es[i]) numWords[es[i]] = i;
}
// Variaciones comunes de voz
numWords['diez y seis'] = 16; numWords['diez y siete'] = 17; numWords['diez y ocho'] = 18; numWords['diez y nueve'] = 19;

function extractSlot(name){const m=name.match(/^(\d+)[_.\-\s]/);return m?parseInt(m[1]):null}
function cleanName(name){return name.replace(/\.[^.]+$/,'').replace(/^\d+[_.\-\s]+/,'').slice(0,15).trim()}

function loadFiles(files){
  let loaded = 0;
  Array.from(files).forEach(file=>{
    const slot = extractSlot(file.name);
    if(slot && slot>=1 && slot<=TOTAL){
      if(pads[slot-1].url) URL.revokeObjectURL(pads[slot-1].url);
      const url = URL.createObjectURL(file);
      pads[slot-1].audio = new Audio(url);
      pads[slot-1].url = url;
      pads[slot-1].name = cleanName(file.name);
      loaded++;
    }
  });
  render();
  showInfo("✅ " + loaded + " audios listos.");
}

function playPad(i){
  const p = pads[i];
  if(!p.audio) return;

  // Si ya suena algo, lo reiniciamos (estilo trigger rápido)
  p.audio.currentTime = 0;
  p.audio.play().catch(e=>console.error(e));

  const el = document.getElementById('pad-'+i);
  if(el){
    el.classList.add('playing');
    p.audio.onended = () => el.classList.remove('playing');
    setTimeout(() => el.classList.remove('playing'), 1000);
  }
  setStatus('▶ ' + p.num, 'playing');
}

function render(){
  const g = document.getElementById('grid');
  g.innerHTML = '';
  pads.forEach((p,i)=>{
    const d = document.createElement('div');
    d.className = 'pad' + (p.audio?' loaded':'');
    d.id = 'pad-'+i;
    d.innerHTML = `<div class="num">${p.num}</div>` + 
      (p.audio ? `<div class="name">${p.name}</div><div class="del" onclick="clearPad(${i})">✕</div>` : `<div class="empty">—</div>`);
    d.onclick = () => playPad(i);
    g.appendChild(d);
  });
}

function clearPad(i){
  event.stopPropagation();
  if(pads[i].url) URL.revokeObjectURL(pads[i].url);
  pads[i].audio = null; pads[i].url = null; pads[i].name = '';
  render();
}

function setStatus(msg,type){
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = type || '';
}

function showInfo(msg){document.getElementById('info').innerHTML = msg}

document.getElementById('micBtn').addEventListener('click', toggleMic);

function toggleMic(){
  if(isListening){ stopMic(); } else { startMic(); }
}

function startMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ showInfo('❌ Navegador no compatible.'); return; }

  recognition = new SR();
  recognition.lang = 'es-MX';
  recognition.continuous = true;      // Mantener micro prendido
  recognition.interimResults = true;   // Resultados mientras hablas para velocidad máxima

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('micBtn').textContent = '🔴 Escucha Activa';
    setStatus('escuchando...','listening');
  };

  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; ++i) {
      transcript += e.results[i][0].transcript.toLowerCase();
    }

    // Debounce para esperar a palabras largas (evita que 10 gane a 16)
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      processVoice(transcript);
    }, 200); // 200ms es el "punto dulce" entre velocidad y seguridad
  };

  recognition.onerror = (e) => {
    console.log("Error de SR:", e.error);
    if(isListening && e.error !== 'aborted') restartMic();
  };

  recognition.onend = () => {
    if(isListening) restartMic(); // Si se apaga solo, lo revivimos
  };

  recognition.start();
}

function restartMic(){
  if(recognition) try{ recognition.abort(); } catch(e){}
  setTimeout(() => { if(isListening) startMic(); }, 300);
}

function stopMic(){
  isListening = false;
  if(recognition) recognition.abort();
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').textContent = '🎤 Activar Escucha Continua';
  setStatus('pausado','');
}

function processVoice(text){
  // Ordenar llaves por longitud descendente (IMPORTANTE)
  const keys = Object.keys(numWords).sort((a,b) => b.length - a.length);
  
  let found = null;
  for(const k of keys){
    if(text.includes(k)){
      found = numWords[k];
      break; 
    }
  }

  if(found && found !== lastTriggered){
    if(pads[found-1].audio){
      playPad(found-1);
      showInfo("Escuchado: <b>" + found + "</b>");
      
      // Limpiamos el reconocimiento para que no se acumule texto y se bugee
      lastTriggered = found;
      setTimeout(() => { lastTriggered = 0; }, 1000); // Cooldown de 1 seg para el mismo pad
      restartMic(); 
    }
  }
}

render();
</script>
</body>
</html>
