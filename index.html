<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Botonera Voz</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e11;color:#f0f0f5;font-family:sans-serif;min-height:100vh;padding:10px}
  header{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2a2a35;margin-bottom:10px}
  .logo{color:#00e5ff;font-weight:bold;font-size:14px}
  #status{font-size:11px;color:#6b6b80;background:#1a1a20;padding:4px 10px;border-radius:20px}
  #status.listening{color:#ff3d6e;border:1px solid #ff3d6e;animation:blink 1s infinite}
  #status.playing{color:#00ff9d;border:1px solid #00ff9d}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
  .controls{display:flex;gap:8px;margin-bottom:10px}
  button{flex:1;padding:14px;border-radius:10px;border:1px solid #2a2a35;background:#1a1a20;color:#f0f0f5;font-size:13px;font-weight:bold;cursor:pointer}
  button:active{transform:scale(.97)}
  #micBtn{border-color:#7c4dff;color:#00e5ff}
  #micBtn.on{background:rgba(255,61,110,.15);border-color:#ff3d6e;color:#ff3d6e}
  #loadBtn{border-color:#00e5ff;color:#00e5ff;background:#05191C}
  input[type=file]{display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .pad{background:#16161c;border:1px solid #2a2a35;border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px;min-height:80px}
  .pad.loaded{background:#1a1f2e;border-color:#2a3050}
  .pad.playing{background:#0d2035;border-color:#00e5ff;box-shadow:0 0 15px rgba(0,229,255,.2)}
  .num{width:28px;height:28px;border-radius:50%;background:#22222a;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#6b6b80}
  .pad.loaded .num{background:rgba(124,77,255,.3);color:#b39dff}
  .pad.playing .num{background:#00e5ff;color:#000}
  .name{font-size:12px;font-weight:bold;text-align:center}
  .play{font-size:11px;color:#00e5ff;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:20px;padding:4px 10px;cursor:pointer;margin-top:4px}
  .del{position:absolute;top:5px;right:8px;color:#6b6b80;font-size:14px;cursor:pointer}
  .empty{color:#6b6b80;font-size:11px}
  .info{font-size:12px;color:#6b6b80;padding:10px;background:#1a1a20;border-radius:8px;margin-bottom:10px;border-left:3px solid #00e5ff}
</style>
</head>
<body>

<header>
  <div class="logo">VOZBOARD</div>
  <div id="status">listo</div>
</header>

<div class="controls">
  <button id="micBtn">🎤 Activar micrófono</button>
  <label style="flex:1">
    <button id="loadBtn" onclick="document.getElementById('fileInput').click()">📁 Cargar audios</button>
    <input type="file" id="fileInput" accept="audio/*" multiple onchange="loadFiles(this.files)">
  </label>
</div>

<div class="info" id="info">Carga audios tipo "1_sonido.mp3" y di el número para reproducir</div>

<div class="grid" id="grid"></div>

<script>
const TOTAL = 50;
const pads = Array.from({length: TOTAL}, (_, i) => ({num: i+1, name: '', audio: null, url: null}));
let recognition = null, isListening = false, currentAudio = null;
let isPlaying = false;

// Mapa de números: texto → número
const numWords = {};
const esWords = [
  '','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez',
  'once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve',
  'veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis',
  'veintisiete','veintiocho','veintinueve','treinta',
  'treinta y uno','treinta y dos','treinta y tres','treinta y cuatro','treinta y cinco',
  'treinta y seis','treinta y siete','treinta y ocho','treinta y nueve',
  'cuarenta','cuarenta y uno','cuarenta y dos','cuarenta y tres','cuarenta y cuatro',
  'cuarenta y cinco','cuarenta y seis','cuarenta y siete','cuarenta y ocho','cuarenta y nueve',
  'cincuenta'
];
for (let i = 1; i <= 50; i++) {
  numWords[String(i)] = i;
  if (esWords[i]) numWords[esWords[i]] = i;
}
// Variantes alternativas que el reconocedor puede transcribir diferente
const altForms = {
  'veinte y uno': 21, 'veinte y dos': 22, 'veinte y tres': 23, 'veinte y cuatro': 24,
  'veinte y cinco': 25, 'veinte y seis': 26, 'veinte y siete': 27, 'veinte y ocho': 28,
  'veinte y nueve': 29, 'diez y seis': 16, 'diez y siete': 17, 'diez y ocho': 18, 'diez y nueve': 19
};
Object.assign(numWords, altForms);

function norm(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9\s]/g, '').trim();
}

// Mapa normalizado (sin acentos) construido una vez
const numWordsNorm = {};
for (const [k, v] of Object.entries(numWords)) {
  numWordsNorm[norm(k)] = v;
}
const sortedKeys = Object.keys(numWordsNorm).sort((a, b) => b.length - a.length);

function extractSlot(name) {
  const m = name.match(/^(\d+)[_.\-\s]/);
  return m ? parseInt(m[1]) : null;
}
function cleanName(name) {
  return name.replace(/\.[^.]+$/, '').replace(/^\d+[_.\-\s]+/, '').slice(0, 20).trim();
}

function loadFiles(files) {
  let loaded = 0;
  Array.from(files).forEach(file => {
    const slot = extractSlot(file.name);
    if (slot && slot >= 1 && slot <= TOTAL) {
      if (pads[slot-1].url) URL.revokeObjectURL(pads[slot-1].url);
      const url = URL.createObjectURL(file);
      pads[slot-1].audio = new Audio(url);
      pads[slot-1].url = url;
      pads[slot-1].name = cleanName(file.name) || file.name.replace(/\.[^.]+$/, '').slice(0, 18);
      loaded++;
    }
  });
  render();
  setStatus('✓ ' + loaded + ' cargados', 'playing');
  showInfo(loaded + ' audios cargados. Di el número para reproducir');
}

function playPad(i) {
  const p = pads[i];
  if (!p.audio) return;

  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  p.audio.currentTime = 0;
  isPlaying = true;
  p.audio.play().catch(e => console.error(e));
  currentAudio = p.audio;

  document.querySelectorAll('.pad').forEach(el => el.classList.remove('playing'));
  const el = document.getElementById('pad-' + i);
  if (el) {
    el.classList.add('playing');
    p.audio.onended = () => {
      el.classList.remove('playing');
      setStatus('listo', '');
      isPlaying = false;
      if (isListening) {
        setTimeout(() => { if (isListening) startMic(); }, 300);
      }
    };
  }
  setStatus('▶ ' + p.num + (p.name ? ' — ' + p.name : ''), 'playing');
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  pads.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'pad' + (p.audio ? ' loaded' : '');
    d.id = 'pad-' + i;
    d.style.position = 'relative';
    d.innerHTML = '<div class="num">' + p.num + '</div>' + (p.audio
      ? '<div class="name">' + p.name + '</div><div class="play" onclick="playPad(' + i + ')">▶ play</div><div class="del" onclick="event.stopPropagation();clearPad(' + i + ')">✕</div>'
      : '<div class="empty">vacío</div>');
    g.appendChild(d);
  });
}

function clearPad(i) {
  if (pads[i].url) URL.revokeObjectURL(pads[i].url);
  pads[i].audio = null; pads[i].url = null; pads[i].name = '';
  render();
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = type || '';
}

function showInfo(msg) { document.getElementById('info').textContent = msg; }

document.getElementById('micBtn').addEventListener('click', toggleMic);

function toggleMic() {
  if (isListening) { stopMic(); } else { startMic(); }
}

function startMic() {
  if (isPlaying) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showInfo('❌ Tu navegador no soporta voz. Usa Chrome.'); return; }

  if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }

  recognition = new SR();
  recognition.lang = 'es-MX';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('micBtn').textContent = '🔴 Escuchando...';
    setStatus('● escuchando', 'listening');
    showInfo('Di un número del 1 al 50...');
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase().trim();
    showInfo('Escuchado: "' + text + '"');
    processText(text);
  };

  recognition.onerror = (e) => {
    console.log('Error:', e.error);
    if (e.error === 'not-allowed') {
      showInfo('❌ Permiso denegado. Activa el micrófono en ajustes.');
      stopMic();
    } else if (e.error === 'no-speech') {
      showInfo('No se detectó voz. Intenta de nuevo.');
      if (isListening && !isPlaying) setTimeout(() => { if (isListening && !isPlaying) startMic(); }, 400);
    } else {
      if (isListening && !isPlaying) setTimeout(() => { if (isListening && !isPlaying) startMic(); }, 400);
    }
  };

  recognition.onend = () => {
    if (isListening && !isPlaying) {
      setTimeout(() => { if (isListening && !isPlaying) startMic(); }, 300);
    }
  };

  try { recognition.start(); } catch(e) { showInfo('Error al iniciar: ' + e.message); }
}

function stopMic() {
  isListening = false;
  if (recognition) try { recognition.abort(); } catch(e) {}
  recognition = null;
  document.getElementById('micBtn').classList.remove('on');
  document.getElementById('micBtn').textContent = '🎤 Activar micrófono';
  setStatus('listo', '');
}

function processText(text) {
  // Normalizar: quitar acentos y caracteres raros
  const t = norm(text);

  let found = null;
  for (const key of sortedKeys) {
    // Buscar como palabra completa, no subcadena (evita "dos" dentro de "doce")
    const re = new RegExp('(?<![a-z])' + key.replace(/\s+/g, '\\s+') + '(?![a-z])', 'i');
    if (re.test(t)) { found = numWordsNorm[key]; break; }
  }

  if (found && found >= 1 && found <= TOTAL) {
    showInfo('✅ Número: ' + found);
    if (pads[found-1].audio) {
      if (recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
      playPad(found-1);
    } else {
      showInfo('Slot ' + found + ' vacío');
      if (isListening && !isPlaying) setTimeout(() => { if (isListening && !isPlaying) startMic(); }, 300);
    }
  } else {
    showInfo('❓ No reconocí número en: "' + text + '"');
    if (isListening && !isPlaying) setTimeout(() => { if (isListening && !isPlaying) startMic(); }, 300);
  }
}

render();
showInfo('1. Carga audios (ej: "1_risa.mp3")  2. Toca micrófono  3. Di el número');
</script>

</body>
</html>
